<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/assets/images/bitcoin-logo.ico">
    <title>B</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="word"></div>
    <div id="multiple-choice"></div>
    <div id="feedback" class="feedback"></div>

    <nav>
        <button id="prev" class="default-button">previous</button>
        |
        <button id="next" class="default-button">next</button>
    </nav>

    <p><a href="./index-old.html">Old index</a></p>

    <h1>Speech synthesiser</h1>

    <form>
        <label for="txt">Enter text</label>
        <input id="txt" type="text" class="txt" />
        <div>
          <label for="rate">Rate</label
          ><input type="range" min="0.5" max="2" value="1" step="0.1" id="rate" />
          <div class="rate-value">1</div>
          <div class="clearfix"></div>
        </div>
        <div>
          <label for="pitch">Pitch</label
          ><input type="range" min="0" max="2" value="1" step="0.1" id="pitch" />
          <div class="pitch-value">1</div>
          <div class="clearfix"></div>
        </div>
        <select id="voiceSelect"></select>
        <div class="controls">
          <button id="play" type="submit">Play</button>
        </div>
      </form>   

    <script src="script.js"></script>
</body>

</html>
