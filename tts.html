<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Do You Speak Thai?</title>

    <!-- Optional Google font for nicer Thai rendering (Sarabun) -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --highlight-light: #ffeb3b;
            /* yellow for light mode */
            --highlight-dark: #ff9800;
            /* orange for dark mode */
            --accent: #6200ea;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            background: #f8f8f8;
            color: #000;
            transition: background .2s, color .2s;
        }

        /* Header (settings button right-justified) */
        header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 10px 16px;
            background: #eee;
            border-bottom: 1px solid #ccc;
        }

        header button {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
        }

        main {
            padding: 12px;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Controls row: label + select stay on same line */
        .control-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 8px;
        }

        .control-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        hr {
            border: none;
            border-top: 1px solid #ddd;
            margin: 8px 0 12px;
        }

        /* Paragraph text */
        .paragraph {
            line-height: 1.6;
            font-size: 1.05rem;
            min-height: 3.5rem;
        }

        .paragraph .word {
            margin: 0 .12rem;
            cursor: pointer;
            display: inline-block;
        }

        .paragraph .word.highlight {
            padding: 2px 4px;
            border-radius: 4px;
        }

        /* Paragraph controls (kept below paragraph) with border under */
        .paragraph-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-top: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ccc;
            margin-bottom: 12px;
        }

        button.control-btn {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #bbb;
            background: #fff;
            cursor: pointer;
        }

        button.control-btn:active {
            transform: translateY(1px);
        }

        /* Quiz content + controls */
        #quizContent {
            margin-top: 8px;
            min-height: 80px;
        }

        .quiz-question {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .quiz-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .quiz-option {
            display: inline-block;
            padding: 6px 10px;
            border: 1px solid #bbb;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
        }

        .quiz-option.correct {
            background: #4caf50;
            color: #fff;
            border-color: #4caf50;
        }

        .quiz-option.incorrect {
            background: #f44336;
            color: #fff;
            border-color: #f44336;
        }

        /* Quiz controls placed below quiz content */
        .quiz-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-top: 12px;
            border-top: 1px solid #ddd;
            padding-top: 10px;
        }

        /* Score */
        #quizScore {
            font-weight: 600;
            margin-left: 8px;
        }

        /* Dark mode */
        body.dark {
            background: #121212;
            color: #EEE;
        }

        body.dark header {
            background: #1b1b1b;
            border-bottom-color: #333;
        }

        body.dark .paragraph .word.highlight {
            background: var(--highlight-dark);
            color: #000;
        }

        body:not(.dark) .paragraph .word.highlight {
            background: var(--highlight-light);
            color: #000;
        }

        /* small responsive tweaks */
        @media (max-width:600px) {
            .control-row {
                gap: 8px;
            }

            .paragraph {
                font-size: 1.15rem;
            }
        }
    </style>
</head>

<body>
    <header>
        <!-- Settings inline in header: theme radios & font select moved into a small popover -->
        <div id="settingsInline" style="display:flex;gap:8px;align-items:center;">
            <label style="display:flex;align-items:center;gap:6px;font-size:0.95rem;">
                <input type="radio" name="theme" id="themeDay" value="day" /> ☀️
            </label>
            <label style="display:flex;align-items:center;gap:6px;font-size:0.95rem;">
                <input type="radio" name="theme" id="themeNight" value="night" /> 🌙
            </label>

            <label style="display:flex;align-items:center;gap:6px;">
                <span style="font-size:.9rem">Thai Font:</span>
                <select id="thaiFontSelect" style="padding:6px;border-radius:6px;border:1px solid #bbb;">
                    <option value="">Default</option>
                    <option value="Sarabun">Sarabun</option>
                    <option value="Noto Sans Thai">Noto Sans Thai</option>
                    <option value="Tahoma">Tahoma</option>
                    <option value="Thonburi">Thonburi</option>
                </select>
            </label>
        </div>
    </header>

    <main>
        <div class="control-row">
            <div class="control-item"><label for="bookSelect">Book:</label><select id="bookSelect"></select></div>
            <div class="control-item"><label for="chapterSelect">Chapter:</label><select id="chapterSelect"></select>
            </div>
            <div class="control-item"><label for="paragraphSelect">Paragraph:</label><select
                    id="paragraphSelect"></select></div>
        </div>

        <hr />

        <div class="paragraph" id="paragraphText" aria-live="polite"></div>

        <div class="paragraph-controls" id="paragraphControls">
            <button id="playBtn" class="control-btn">▶️ Play</button>
            <button id="pauseBtn" class="control-btn">⏸ Pause</button>
            <button id="restartBtn" class="control-btn">🔁 Restart</button>

            <label style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="showThai" checked />
                Thai</label>
            <label style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="showEnglish" />
                English</label>
            <label style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="showHint" /> Hint</label>
        </div>

        <!-- Quiz (content above, controls below) -->
        <div id="quizContent"></div>

        <div class="quiz-controls" id="quizControls">
            <button id="prevQ" class="control-btn">⬅️ Previous</button>
            <button id="nextQ" class="control-btn">➡️ Next</button>
            <button id="retryQ" class="control-btn">🔄 Retry</button>

            <label style="display:flex;align-items:center;gap:6px">
                <input type="radio" name="quizLang" id="quizThai" value="thai" checked /> Question Thai
            </label>
            <label style="display:flex;align-items:center;gap:6px">
                <input type="radio" name="quizLang" id="quizEnglish" value="english" /> Question English
            </label>

            <label style="display:flex;align-items:center;gap:6px">
                <input type="checkbox" id="incorrectOnly" /> Incorrectly Answered Only
            </label>

            <span id="quizScore">Score: 0/0</span>
        </div>
    </main>

    <script>
        /* -------------------------
           Data: single default book /
           Greetings paragraph (10 sentences)
           ------------------------- */
        const books = [
            {
                title: "Do you speak Thai?",
                chapters: [
                    {
                        title: "Greetings",
                        paragraphs: [
                            [
                                { thai: "สวัสดี", english: "Hello", hint: "Common greeting" },
                                { thai: "สบายดีไหม", english: "How are you?", hint: "Ask how someone is" },
                                { thai: "ฉันสบายดี", english: "I'm fine", hint: "Reply" },
                                { thai: "คุณชื่ออะไร", english: "What's your name?", hint: "Ask name" },
                                { thai: "ฉันชื่อสมชาย", english: "My name is Somchai", hint: "Introduce yourself" },
                                { thai: "ยินดีที่ได้รู้จัก", english: "Nice to meet you", hint: "Polite greeting" },
                                { thai: "วันนี้อากาศดี", english: "The weather is nice today", hint: "Small talk" },
                                { thai: "คุณไปไหน", english: "Where are you going?", hint: "Small talk" },
                                { thai: "ไปห้างสรรพสินค้า", english: "To the mall", hint: "Reply" },
                                { thai: "ลาก่อน", english: "Goodbye", hint: "Farewell" }
                            ]
                        ]
                    },
                    {
                        title: "Do you speak Thai?",
                        paragraphs: [
                            // Paragraph 1: Short Answer (5 sentences)
                            [
                                { thai: "ฉันพูดภาษาไทยได้นิดหน่อย", english: "I can speak a little Thai", hint: "Basic phrase" },
                                { thai: "ฉันเข้าใจคำง่ายๆ", english: "I understand simple words", hint: "Simple ability" },
                                { thai: "ฉันพูดช้าๆ ได้", english: "I can speak slowly", hint: "Speaking pace" },
                                { thai: "ฉันตอบได้สั้นๆ", english: "I can answer shortly", hint: "Simple reply" },
                                { thai: "ฉันยังเรียนภาษาไทยอยู่", english: "I am still learning Thai", hint: "Learning process" }
                            ],
                            // Paragraph 2: Long Answer (10 sentences)
                            [
                                { thai: "ภาษาไทยเป็นภาษาที่ยากสำหรับฉัน", english: "Thai is a difficult language for me", hint: "Difficulty" },
                                { thai: "มีเสียงวรรณยุกต์หลายเสียง", english: "It has many tones", hint: "Tone system" },
                                { thai: "ฉันสับสนระหว่างเสียงสูงและเสียงต่ำ", english: "I confuse high and low tones", hint: "Tone confusion" },
                                { thai: "ตัวอักษรไทยมีมากมาย", english: "Thai letters are numerous", hint: "Alphabet" },
                                { thai: "การเขียนภาษาไทยไม่ง่าย", english: "Writing Thai is not easy", hint: "Writing difficulty" },
                                { thai: "การอ่านก็ซับซ้อน", english: "Reading is also complicated", hint: "Reading complexity" },
                                { thai: "แต่ฉันชอบภาษาไทย", english: "But I like Thai", hint: "Positive feeling" },
                                { thai: "ฉันอยากพูดได้คล่อง", english: "I want to speak fluently", hint: "Motivation" },
                                { thai: "ฉันต้องฝึกทุกวัน", english: "I must practice every day", hint: "Practice" },
                                { thai: "ฉันหวังว่าสักวันฉันจะพูดเก่ง", english: "I hope one day I will speak well", hint: "Goal" }
                            ]
                        ]
                    }
                ]
            }
        ];


        /* -------------------------
           State
           ------------------------- */
        let currentBook = 0, currentChapter = 0, currentParagraph = 0;
        let playing = false, playIndex = 0;
        let quizData = [];        // array of { word, options[], attempted, correct }
        let currentQ = 0;         // index into quizData
        let filteredIndices = null; // for incorrectOnly mode: array of indices to show
        const MIN_OPTIONS = 4;

        /* -------------------------
           DOM refs
           ------------------------- */
        const bookSelect = document.getElementById('bookSelect');
        const chapterSelect = document.getElementById('chapterSelect');
        const paragraphSelect = document.getElementById('paragraphSelect');

        const paragraphText = document.getElementById('paragraphText');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const restartBtn = document.getElementById('restartBtn');

        const showThaiCB = document.getElementById('showThai');
        const showEnglishCB = document.getElementById('showEnglish');
        const showHintCB = document.getElementById('showHint');

        const quizContent = document.getElementById('quizContent');
        const prevQBtn = document.getElementById('prevQ');
        const nextQBtn = document.getElementById('nextQ');
        const retryQBtn = document.getElementById('retryQ');
        const quizThaiRadio = document.getElementById('quizThai');
        const quizEnglishRadio = document.getElementById('quizEnglish');
        const incorrectOnlyCB = document.getElementById('incorrectOnly');
        const quizScoreSpan = document.getElementById('quizScore');

        const thaiFontSelect = document.getElementById('thaiFontSelect');
        const themeDay = document.getElementById('themeDay');
        const themeNight = document.getElementById('themeNight');

        /* -------------------------
           Utility & persistence
           ------------------------- */
        function saveSetting(key, val) { try { localStorage.setItem(key, val); } catch (e) { } }
        function readSetting(key, fallback) { try { return localStorage.getItem(key) ?? fallback } catch (e) { return fallback; } }

        /* Dynamic style for Thai font so that future elements pick it up */
        function setThaiFontRule(font) {
            let id = 'thai-font-style';
            let styleEl = document.getElementById(id);
            if (!styleEl) {
                styleEl = document.createElement('style'); styleEl.id = id; document.head.appendChild(styleEl);
            }
            if (!font || font.trim() === '') {
                styleEl.innerHTML = '';
            } else {
                // use !important to ensure it applies
                styleEl.innerHTML = `[lang="th-TH"]{ font-family: "${font}", "Sarabun", "Noto Sans Thai", Tahoma, sans-serif !important; }`;
            }
        }

        /* Theme apply */
        function applyTheme(theme) {
            if (theme === 'night') document.body.classList.add('dark');
            else document.body.classList.remove('dark');
            // save
            saveSetting('tts_theme', theme);
        }
        function applySavedTheme() {
            const t = readSetting('tts_theme', 'day');
            applyTheme(t);
            themeDay.checked = (t === 'day');
            themeNight.checked = (t === 'night');
        }

        /* Font apply */
        function applySavedFont() {
            const f = readSetting('tts_thai_font', '');
            thaiFontSelect.value = f;
            setThaiFontRule(f);
        }

        /* -------------------------
           Populate controls
           ------------------------- */
        function populateBooks() {
            bookSelect.innerHTML = '';
            books.forEach((b, i) => {
                const o = document.createElement('option'); o.value = i; o.textContent = b.title;
                bookSelect.appendChild(o);
            });
            bookSelect.value = currentBook;
            populateChapters();
        }
        function populateChapters() {
            const chs = books[currentBook].chapters || [];
            chapterSelect.innerHTML = '';
            chs.forEach((c, i) => {
                const o = document.createElement('option'); o.value = i; o.textContent = c.title;
                chapterSelect.appendChild(o);
            });
            chapterSelect.value = currentChapter;
            populateParagraphs();
        }
        function populateParagraphs() {
            const paras = books[currentBook].chapters[currentChapter].paragraphs || [];
            paragraphSelect.innerHTML = '';
            paras.forEach((p, i) => {
                const o = document.createElement('option'); o.value = i; o.textContent = `Paragraph ${i + 1}`;
                paragraphSelect.appendChild(o);
            });
            paragraphSelect.value = currentParagraph;
            renderParagraph();
        }

        /* -------------------------
           Paragraph rendering + TTS play
           ------------------------- */
        function renderParagraph() {
            paragraphText.innerHTML = '';
            const para = books[currentBook].chapters[currentChapter].paragraphs[currentParagraph] || [];
            para.forEach((w, i) => {
                const span = document.createElement('span');
                span.className = 'word';
                span.dataset.index = i;
                // show according to checkboxes (Thai default checked)
                let parts = [];
                if (showThaiCB.checked) { const el = document.createElement('span'); el.lang = 'th-TH'; el.textContent = w.thai; parts.push(el); }
                if (showEnglishCB.checked) { const el = document.createElement('span'); el.lang = 'en-US'; el.textContent = w.english; parts.push(el); }
                if (showHintCB.checked) { const el = document.createElement('span'); el.lang = 'en-US'; el.textContent = ` (${w.hint})`; parts.push(el); }
                // append parts into span
                parts.forEach((p, idx) => { if (idx > 0) span.appendChild(document.createTextNode(' ')); span.appendChild(p); });
                // click => stop play & speak this single word
                span.addEventListener('click', (ev) => {
                    playing = false; speechSynthesis.cancel();
                    playIndex = Number(span.dataset.index);
                    speakWord(playIndex);
                });
                paragraphText.appendChild(span);
            });

            // Apply current Thai font rule again (new spans will pick the global style)
            setThaiFontRule(thaiFontSelect.value);

            // Build quiz from this paragraph
            buildQuizFromParagraph();
        }

        /* Highlight helpers */
        function clearParagraphHighlights() {
            paragraphText.querySelectorAll('.word').forEach(w => w.classList.remove('highlight'));
        }
        function highlightParagraphWord(i) {
            clearParagraphHighlights();
            const w = paragraphText.querySelector(`.word[data-index="${i}"]`);
            if (w) w.classList.add('highlight');
        }

        /* TTS speak helpers */
        function speakText(text, lang) {
            if (!text) return;
            speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = lang;
            speechSynthesis.speak(u);
        }

        /* Play whole paragraph (word by word) */
        function speakWord(i) {
            const para = books[currentBook].chapters[currentChapter].paragraphs[currentParagraph] || [];
            if (i < 0 || i >= para.length) { playing = false; return; }
            const w = para[i];
            // highlight and speak according to selections
            highlightParagraphWord(i);
            // speak Thai/English/hint as per control checkboxes (spec asks to read selected language)
            // We'll speak the Thai text first if Thai is checked; then English if English is checked.
            // If both are unchecked nothing is spoken.
            let queue = [];
            if (showThaiCB.checked) queue.push({ text: w.thai, lang: 'th-TH' });
            if (showEnglishCB.checked) queue.push({ text: w.english, lang: 'en-US' });
            if (showHintCB.checked && w.hint) queue.push({ text: w.hint, lang: 'en-US' });

            // speak queue serially using onend chaining
            if (queue.length === 0) {
                // still proceed to next word
                playIndex = i + 1;
                if (playing && playIndex < para.length) setTimeout(() => speakWord(playIndex), 250);
                else playing = false;
                return;
            }

            let idx = 0;
            function speakNext() {
                if (idx >= queue.length) {
                    // done with this word --> next word (if playing)
                    playIndex = i + 1;
                    if (playing && playIndex < para.length) setTimeout(() => speakWord(playIndex), 250);
                    else playing = false;
                    return;
                }
                const item = queue[idx++];
                const u = new SpeechSynthesisUtterance(item.text);
                u.lang = item.lang;
                u.onend = speakNext;
                speechSynthesis.speak(u);
            }
            speakNext();
        }

        /* Paragraph control handlers */
        playBtn.addEventListener('click', () => {
            // Start playing from current playIndex (or 0 if none)
            const para = books[currentBook].chapters[currentChapter].paragraphs[currentParagraph] || [];
            if (para.length === 0) return;
            if (playIndex >= para.length) playIndex = 0;
            playing = true;
            speakWord(playIndex);
        });
        pauseBtn.addEventListener('click', () => {
            playing = false;
            speechSynthesis.cancel();
        });
        restartBtn.addEventListener('click', () => {
            playing = true;
            playIndex = 0;
            clearParagraphHighlights();
            // start reading
            speakWord(playIndex);
        });

        /* -------------------------
           Quiz generation + rendering
           ------------------------- */
        function buildQuizFromParagraph() {
            const para = books[currentBook].chapters[currentChapter].paragraphs[currentParagraph] || [];
            quizData = para.map(w => {
                // options: correct + random picks from same paragraph
                const opts = [(typeof w === 'object' ? w : { thai: '', english: '' })];
                // collect pool of other words
                const pool = para.filter(x => x !== w).map(x => x);
                // choose up to MIN_OPTIONS-1 unique
                while (opts.length < Math.min(MIN_OPTIONS, Math.max(1, para.length))) {
                    if (pool.length === 0) break;
                    const idx = Math.floor(Math.random() * pool.length);
                    opts.push(pool.splice(idx, 1)[0]);
                }
                // convert opts to the form needed later (we'll choose display text when rendering)
                return { word: w, options: opts, attempted: false, correct: false };
            });
            currentQ = 0;
            filteredIndices = null; // reset filter
            renderQuiz();
        }

        function getFilteredIndices() {
            if (!incorrectOnlyCB.checked) return null;
            const idxs = [];
            for (let i = 0; i < quizData.length; i++) {
                if (quizData[i].attempted && !quizData[i].correct) idxs.push(i);
            }
            return idxs;
        }

        function renderQuiz() {
            quizContent.innerHTML = '';
            if (!quizData || quizData.length === 0) {
                quizContent.textContent = 'No quiz available for this paragraph.';
                updateQuizScore();
                return;
            }

            // Build filtered index list if incorrectOnly is checked
            const filtered = getFilteredIndices();
            if (filtered && filtered.length === 0) {
                quizContent.textContent = 'No incorrectly answered questions.';
                updateQuizScore();
                return;
            }

            // determine which quiz index to show
            let indexToShow = currentQ;
            if (filtered) {
                // clamp filtered position: find position in filtered array corresponding to currentQ if possible.
                // We'll keep a separate pointer: if currentQ not in filtered, show first filtered.
                if (!filtered.includes(currentQ)) indexToShow = filtered[0];
                else indexToShow = currentQ;
            }

            const qObj = quizData[indexToShow];
            if (!qObj) { quizContent.textContent = 'No question.'; updateQuizScore(); return; }

            // Question language radio (default Thai)
            const qLang = quizThaiRadio.checked ? 'thai' : 'english';
            const qText = (qLang === 'thai') ? qObj.word.thai : qObj.word.english;
            const ansField = (qLang === 'thai') ? 'english' : 'thai';
            const speakLang = (qLang === 'thai') ? 'th-TH' : 'en-US';

            // speak the question immediately
            speechSynthesis.cancel();
            speakText(qText, speakLang);

            // render
            const qEl = document.createElement('div'); qEl.className = 'quiz-question'; qEl.textContent = 'Q: ' + qText;
            quizContent.appendChild(qEl);

            // ensure options include the correct answer and fill up to MIN_OPTIONS from paragraph words
            // build display options using the qObj.options (they are word objects)
            const optionsContainer = document.createElement('div'); optionsContainer.className = 'quiz-options';
            const displayOptions = qObj.options.slice(); // copy
            // If options less than MIN_OPTIONS, pad with other paragraph items not yet included
            const para = books[currentBook].chapters[currentChapter].paragraphs[currentParagraph] || [];
            for (let i = displayOptions.length; i < Math.min(MIN_OPTIONS, para.length); i++) {
                // find a random para item not present
                const pool = para.filter(pw => !displayOptions.includes(pw));
                if (pool.length === 0) break;
                displayOptions.push(pool[Math.floor(Math.random() * pool.length)]);
            }
            // Shuffle
            displayOptions.sort(() => 0.5 - Math.random());

            displayOptions.forEach(optWord => {
                const text = ansField === 'thai' ? optWord.thai : optWord.english;
                const optionEl = document.createElement('span');
                optionEl.className = 'quiz-option';
                optionEl.textContent = text;
                optionEl.style.userSelect = 'none';
                optionEl.addEventListener('click', function onClick() {
                    // disable further clicks for these options
                    optionsContainer.querySelectorAll('.quiz-option').forEach(el => el.style.pointerEvents = 'none');
                    qObj.attempted = true;
                    const correctText = ansField === 'thai' ? qObj.word.thai : qObj.word.english;
                    if (text === correctText) {
                        optionEl.classList.add('correct');
                        qObj.correct = true;
                    } else {
                        optionEl.classList.add('incorrect');
                        // highlight correct one
                        optionsContainer.querySelectorAll('.quiz-option').forEach(el => {
                            if (el.textContent === correctText) el.classList.add('correct');
                        });
                        qObj.correct = false;
                    }
                    // speak selected answer in its language
                    const speakLangAns = (ansField === 'thai') ? 'th-TH' : 'en-US';
                    speakText(text, speakLangAns);

                    updateQuizScore();
                }, { once: true });
                optionsContainer.appendChild(optionEl);
            });

            quizContent.appendChild(optionsContainer);
            updateQuizScore();
        }

        /* Quiz control handlers */
        prevQBtn.addEventListener('click', () => {
            const filtered = getFilteredIndices();
            if (filtered) {
                // find index in filtered list
                const pos = filtered.indexOf(currentQ);
                if (pos > 0) currentQ = filtered[pos - 1];
                else currentQ = filtered[filtered.length - 1]; // wrap
            } else {
                currentQ = (currentQ - 1 + quizData.length) % quizData.length;
            }
            renderQuiz();
        });

        nextQBtn.addEventListener('click', () => {
            const filtered = getFilteredIndices();
            if (filtered) {
                const pos = filtered.indexOf(currentQ);
                if (pos < 0) currentQ = filtered[0];
                else currentQ = filtered[(pos + 1) % filtered.length];
            } else {
                currentQ = (currentQ + 1) % quizData.length;
            }
            renderQuiz();
        });

        retryQBtn.addEventListener('click', () => {
            // reset attempts and score, keep same question order
            quizData.forEach(q => { q.attempted = false; q.correct = false; });
            currentQ = 0;
            renderQuiz();
        });

        /* Update score display */
        function updateQuizScore() {
            const total = quizData.length;
            const correct = quizData.filter(q => q.correct).length;
            quizScoreSpan.textContent = `Score: ${correct}/${total}`;
        }

        /* -------------------------
           Event wiring for selects & toggles
           ------------------------- */
        bookSelect.addEventListener('change', () => {
            currentBook = Number(bookSelect.value);
            currentChapter = 0;
            currentParagraph = 0;
            populateChapters();
        });
        chapterSelect.addEventListener('change', () => {
            currentChapter = Number(chapterSelect.value);
            currentParagraph = 0;
            populateParagraphs();
        });
        paragraphSelect.addEventListener('change', () => {
            currentParagraph = Number(paragraphSelect.value);
            renderParagraph();
        });

        /* show/hide parts toggles re-render paragraph */
        showThaiCB.addEventListener('change', renderParagraph);
        showEnglishCB.addEventListener('change', renderParagraph);
        showHintCB.addEventListener('change', renderParagraph);

        /* quiz language change and incorrectOnly re-render quiz (but keep currentQ index) */
        quizThaiRadio.addEventListener('change', renderQuiz);
        quizEnglishRadio.addEventListener('change', renderQuiz);
        incorrectOnlyCB.addEventListener('change', () => {
            // when toggling filter, keep currentQ but ensure it's valid
            const filtered = getFilteredIndices();
            if (filtered && filtered.length > 0 && !filtered.includes(currentQ)) currentQ = filtered[0];
            renderQuiz();
        });

        /* Theme and font settings persistence */
        themeDay.addEventListener('change', () => { if (themeDay.checked) { applyTheme('day'); } });
        themeNight.addEventListener('change', () => { if (themeNight.checked) { applyTheme('night'); } });

        thaiFontSelect.addEventListener('change', () => {
            const f = thaiFontSelect.value || '';
            setThaiFontRule(f);
            saveSetting('tts_thai_font', f);
        });

        /* Initialize page on load */
        function init() {
            // default: paragraph Thai shown and quiz question Thai checked (set in markup)
            // populate controls
            populateBooks();
            populateChapters();
            populateParagraphs();

            // restore saved theme/font
            applySavedTheme();
            applySavedFont();

            // set listeners to persist theme and font state
            saveSetting('tts_theme', readSetting('tts_theme', 'day'));
            // ensure UI default states
            showThaiCB.checked = true;
            quizThaiRadio.checked = true;
        }
        window.addEventListener('load', init);
    </script>
</body>

</html>
