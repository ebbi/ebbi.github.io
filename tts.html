<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Do You Speak Thai App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #f8f8f8;
            color: #000;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #4a90e2;
            color: white;
        }

        header button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2em;
            cursor: pointer;
        }

        aside {
            position: fixed;
            top: 50px;
            right: 0;
            width: 300px;
            height: 100%;
            background: #eee;
            overflow: auto;
            padding: 10px;
            display: none;
            box-shadow: -2px 0 5px rgba(0, 0, 0, 0.2);
        }

        main {
            margin: 10px;
            margin-top: 60px;
        }

        .control-panel {
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .control-panel label {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #paragraph {
            margin: 10px 0;
            font-size: 1.2em;
            line-height: 1.5;
        }

        #paragraph .word {
            cursor: pointer;
            padding: 0 2px;
        }

        #paragraph .highlight {
            background: yellow;
            font-weight: bold;
        }

        .quiz-question {
            margin: 10px 0;
            font-weight: bold;
            font-size: 1.1em;
        }

        .quiz-option {
            padding: 5px;
            margin: 2px 0;
            border: 1px solid #ccc;
            cursor: pointer;
            border-radius: 4px;
        }

        .quiz-option.correct {
            background: lightgreen;
        }

        .quiz-option.incorrect {
            background: #f08080;
        }

        select,
        button {
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        @media(max-width:600px) {
            #paragraph {
                font-size: 1.4em;
            }
        }
    </style>
</head>

<body>

    <header>
        <button id="homeBtn">🏠 Home</button>
        <button id="settingsBtn">⚙️</button>
    </header>

    <aside id="sidebar">
        <h3>Settings</h3>
        <label>
            Theme:
            <select id="themeSelect">
                <option value="day">Day</option>
                <option value="night">Night</option>
            </select>
        </label>
        <br><br>
        <label>
            Thai Font:
            <select id="thaiFontSelect">
                <option value="Tahoma">Tahoma</option>
                <option value="Sarabun">Sarabun</option>
                <option value="TH Chakra Petch">TH Chakra Petch</option>
                <option value="TH Krub">TH Krub</option>
            </select>
        </label>
    </aside>

    <main>
        <div>
            <label>Book:
                <select id="bookSelect"></select>
            </label>
            <label>Chapter:
                <select id="chapterSelect"></select>
            </label>
            <label>Paragraph:
                <select id="paragraphSelect"></select>
            </label>
        </div>

        <div class="control-panel">
            <button id="playBtn">▶️ Play</button>
            <button id="pauseBtn">⏸️ Pause</button>
            <button id="restartBtn">🔄 Restart</button>
            <label><input type="checkbox" id="langTH" checked> Thai</label>
            <label><input type="checkbox" id="langEN" checked> English</label>
            <label><input type="checkbox" id="showHint"> Hint</label>
        </div>

        <div id="paragraph"></div>

        <div class="control-panel">
            <label>Quiz Language:
                <select id="quizLangSelect">
                    <option value="th">Thai Question</option>
                    <option value="en">English Question</option>
                </select>
            </label>
            <label><input type="checkbox" id="randomizeQ"> Randomize Questions</label>
            <label><input type="checkbox" id="incorrectOnly"> Incorrect Only</label>
            <label><input type="checkbox" id="showHints"> Show Hint</label>
            <button id="prevQ">⬅️ Prev</button>
            <button id="nextQ">➡️ Next</button>
        </div>

        <div id="quizContent"></div>
        <div>Score: <span id="scoreDisplay">0</span></div>
    </main>

    <script>
        const books = [{
            title: "Do you speak Thai",
            description: "Learn Thai consonants and vowels",
            chapters: [
                {
                    title: "Thai Consonants",
                    paragraphs: [
                        {
                            words: [
                                { Thai: "ก", English: "g", hint: "low class consonant" },
                                { Thai: "ข", English: "kh", hint: "high class consonant" },
                                { Thai: "ค", English: "k", hint: "low class consonant" }
                            ]
                        }
                    ]
                },
                {
                    title: "Thai Vowels",
                    paragraphs: [
                        {
                            words: [
                                { Thai: "า", English: "aa", hint: "long vowel" },
                                { Thai: "ิ", English: "i", hint: "short vowel" },
                                { Thai: "ี", English: "ii", hint: "long vowel" }
                            ]
                        }
                    ]
                }
            ]
        }];

        let currentBookIndex = 0, currentChapterIndex = 0, currentParagraphIndex = 0;
        let currentWordIndex = 0, playTimeout = null, isPlaying = false;
        let quizData = [], currentQIndex = 0, score = 0;

        /* Toolbar events */
        document.getElementById("settingsBtn").onclick = () => {
            document.getElementById("sidebar").style.display =
            document.getElementById("sidebar").style.display === "block" ? "none" : "block";
        };
        document.getElementById("homeBtn").onclick = () => {
            currentBookIndex = 0; currentChapterIndex = 0; currentParagraphIndex = 0;
            document.getElementById("sidebar").style.display = "none";
            populateBooks();
        };

        /* Populate lists */
        function populateBooks() {
            const bookSelect = document.getElementById("bookSelect"); bookSelect.innerHTML = "";
            books.forEach((b, i) => { const opt = document.createElement("option"); opt.value = i; opt.textContent = b.title; bookSelect.appendChild(opt); });
            bookSelect.selectedIndex = currentBookIndex; populateChapters();
        }
        function populateChapters() {
            const chapSelect = document.getElementById("chapterSelect"); chapSelect.innerHTML = "";
            const chaps = books[currentBookIndex].chapters;
            chaps.forEach((c, i) => { const opt = document.createElement("option"); opt.value = i; opt.textContent = c.title; chapSelect.appendChild(opt); });
            chapSelect.selectedIndex = currentChapterIndex; populateParagraphs();
        }
        function populateParagraphs() {
            const paraSelect = document.getElementById("paragraphSelect"); paraSelect.innerHTML = "";
            const paras = books[currentBookIndex].chapters[currentChapterIndex].paragraphs;
            paras.forEach((p, i) => { const opt = document.createElement("option"); opt.value = i; opt.textContent = `Paragraph ${i + 1}`; paraSelect.appendChild(opt); });
            paraSelect.selectedIndex = currentParagraphIndex; loadParagraph();
        }

        document.getElementById("bookSelect").onchange = e => { currentBookIndex = parseInt(e.target.value); currentChapterIndex = 0; currentParagraphIndex = 0; populateChapters(); };
        document.getElementById("chapterSelect").onchange = e => { currentChapterIndex = parseInt(e.target.value); currentParagraphIndex = 0; populateParagraphs(); };
        document.getElementById("paragraphSelect").onchange = e => { currentParagraphIndex = parseInt(e.target.value); loadParagraph(); };

        /* Paragraph checkboxes update immediately */
        document.getElementById("langTH").onchange = loadParagraph;
        document.getElementById("langEN").onchange = loadParagraph;
        document.getElementById("showHint").onchange = loadParagraph;

        /* Unified TTS */
        function speakUnified(item, options = {}) {
            const { speakTH = false, speakEN = false, speakHint = false, lang = null } = options;
            speechSynthesis.cancel();
            if (typeof item === "string" && lang) { const utt = new SpeechSynthesisUtterance(item); utt.lang = (lang === "th" ? "th-TH" : "en-US"); speechSynthesis.speak(utt); return; }
            if (item.Thai || item.English) {
                if (speakTH && item.Thai) { const uttTH = new SpeechSynthesisUtterance(item.Thai); uttTH.lang = "th-TH"; speechSynthesis.speak(uttTH); }
                if (speakEN && item.English) { const uttEN = new SpeechSynthesisUtterance(item.English); uttEN.lang = "en-US"; speechSynthesis.speak(uttEN); }
                if (speakHint && item.hint) { const uttHint = new SpeechSynthesisUtterance(item.hint); uttHint.lang = "en-US"; speechSynthesis.speak(uttHint); }
            }
        }

        /* Load paragraph */
        function loadParagraph() {
            const para = books[currentBookIndex].chapters[currentChapterIndex].paragraphs[currentParagraphIndex];
            const showTH = document.getElementById("langTH").checked;
            const showEN = document.getElementById("langEN").checked;
            const showHint = document.getElementById("showHint").checked;

            const div = document.getElementById("paragraph"); div.innerHTML = "";
            para.words.forEach((w) => {
                const span = document.createElement("span"); span.className = "word"; span.wordData = w;
                let txt = ""; if (showTH) txt += w.Thai + " "; if (showEN) txt += w.English + " "; if (showHint && w.hint) txt += w.hint + " ";
                span.textContent = txt.trim();
                span.onclick = () => speakUnified(w, { speakTH: document.getElementById("langTH").checked, speakEN: document.getElementById("langEN").checked, speakHint: document.getElementById("showHint").checked });
                div.appendChild(span);
            });
            buildQuiz();
        }

        /* Paragraph controls */
        document.getElementById("playBtn").onclick = () => { isPlaying = true; currentWordIndex = 0; playParagraph(); };
        document.getElementById("pauseBtn").onclick = () => { isPlaying = false; speechSynthesis.cancel(); if (playTimeout) clearTimeout(playTimeout); };
        document.getElementById("restartBtn").onclick = () => {
            isPlaying = false; currentWordIndex = 0; speechSynthesis.cancel();
            document.querySelectorAll("#paragraph .word").forEach(el => el.classList.remove("highlight"));
            isPlaying = true; playParagraph();
        };

        function playParagraph() {
            const para = books[currentBookIndex].chapters[currentChapterIndex].paragraphs[currentParagraphIndex];
            let i = currentWordIndex;
            function nextWord() {
                if (!isPlaying || i >= para.words.length) { isPlaying = false; return; }
                const showTH = document.getElementById("langTH").checked;
                const showEN = document.getElementById("langEN").checked;
                const showHint = document.getElementById("showHint").checked;
                const w = para.words[i];
                const spans = document.querySelectorAll("#paragraph .word"); spans.forEach(el => el.classList.remove("highlight"));
                spans[i].classList.add("highlight");
                speakUnified(w, { speakTH: showTH, speakEN: showEN, speakHint: showHint });
                currentWordIndex = i + 1;
                i++;
                playTimeout = setTimeout(nextWord, 1000);
            }
            nextWord();
        }

        /* Quiz */
        function buildQuiz() {
            quizData = books[currentBookIndex].chapters[currentChapterIndex].paragraphs[currentParagraphIndex].words.map(w => ({ word: w, correct: null }));
            currentQIndex = 0; score = 0; updateScore(); renderQuizQ();
        }
        function renderQuizQ() {
            const q = quizData[currentQIndex];
            const aLang = document.getElementById("quizLangSelect").value === "th" ? "Thai" : "English";
            const showHint = document.getElementById("showHints").checked;
            const qWord = q.word[aLang];
            const wordsAll = books[currentBookIndex].chapters[currentChapterIndex].paragraphs[currentParagraphIndex].words;
            const otherWords = wordsAll.map(w => w[aLang]).filter(w => w !== q.word[aLang]);
            let options = [q.word[aLang]];
            while (options.length < 4 && otherWords.length > 0) { const idx = Math.floor(Math.random() * otherWords.length); options.push(otherWords.splice(idx, 1)[0]); }
            if (document.getElementById("randomizeQ").checked) options.sort(() => Math.random() - 0.5);

            const div = document.getElementById("quizContent"); div.innerHTML = `<div class="quiz-question">${qWord}</div>`;
            options.forEach(opt => {
                const btn = document.createElement("div"); btn.className = "quiz-option"; btn.textContent = opt;
                if (showHint && q.word.hint) btn.textContent += " (" + q.word.hint + ")";
                btn.onclick = () => {
                    div.querySelectorAll(".quiz-option").forEach(el => el.classList.remove("correct", "incorrect"));
                    const isCorrect = opt === q.word[aLang];
                    btn.classList.add(isCorrect ? "correct" : "incorrect");
                    speakUnified(q.word, { speakTH: aLang === "Thai", speakEN: aLang === "English", speakHint: showHint });
                    if (q.correct === null && isCorrect) score++;
                    q.correct = isCorrect; updateScore();
                };
                div.appendChild(btn);
            });
            speakUnified(qWord, { lang: aLang === "Thai" ? "th" : "en" });
        }

        function updateScore() { document.getElementById("scoreDisplay").textContent = score; }

        document.getElementById("quizLangSelect").onchange = renderQuizQ;
        document.getElementById("prevQ").onclick = () => { currentQIndex--; if (currentQIndex < 0) currentQIndex = quizData.length - 1; renderQuizQ(); };
        document.getElementById("nextQ").onclick = () => { currentQIndex++; if (currentQIndex >= quizData.length) currentQIndex = 0; renderQuizQ(); };
        document.getElementById("randomizeQ").onchange = renderQuizQ;
        document.getElementById("incorrectOnly").onchange = renderQuizQ;
        document.getElementById("showHints").onchange = renderQuizQ;

        /* Settings panel functionality */
        document.getElementById("themeSelect").onchange = e => {
            if (e.target.value === "day") { document.body.style.background = "#f8f8f8"; document.body.style.color = "#000"; }
            else { document.body.style.background = "#222"; document.body.style.color = "#fff"; }
        };
        document.getElementById("thaiFontSelect").onchange = e => {
            const font = e.target.value;
            document.getElementById("paragraph").style.fontFamily = font + ", sans-serif";
        };

        /* Initialize App */
        populateBooks();
    </script>

</body>

</html>
