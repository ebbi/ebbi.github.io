<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do You Speak Thai?</title>
    <style>
        /* ---------- Container & Panels ---------- */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 6px;
            max-width: 1000px;
            margin: auto;
        }

        .panel {
            transition: all 0.4s ease-in-out;
            opacity: 1;
            transform: translateY(0) scale(1);
            padding: 5px;
        }

        .panel.hidden {
            opacity: 0;
            transform: translateY(15px) scale(0.98);
        }

        /* ---------- Paragraph Words ---------- */
        #paragraphContainer {
            line-height: 1.6;
            word-spacing: 0.05em;
            font-size: 1rem;
        }

        #paragraphContainer .word {
            display: inline-block;
            margin: 0;
            padding: 0 1px;
            cursor: pointer;
            border-radius: 3px;
            transition: transform 0.25s, background-color 0.3s, font-size 0.25s;
        }

        .word.highlighted {
            transform: scale(1.12);
            font-weight: 600;
            background-color: rgba(255, 235, 59, 0.25);
        }

        /* ---------- Quiz ---------- */
        #quizPanel .question,
        #quizPanel .answers {
            transition: all 0.4s ease-in-out;
            opacity: 1;
            transform: translateY(0);
            margin: 5px 0;
        }

        button.quiz-answer {
            border-radius: 5px;
            margin: 3px;
            cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s, background-color 0.25s;
        }

        button.quiz-answer.correct {
            background-color: rgba(76, 175, 80, 0.35);
        }

        button.quiz-answer.incorrect {
            background-color: rgba(244, 67, 54, 0.35);
        }

        button.quiz-answer:hover {
            transform: scale(1.05);
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.2);
        }

        /* ---------- Resources ---------- */
        details.resource summary {
            cursor: pointer;
            transition: transform 0.25s, background-color 0.25s;
        }

        details.resource summary:hover {
            transform: scale(1.05);
            background-color: rgba(76, 175, 80, 0.15);
        }

        /* ---------- Day/Night Themes ---------- */
        body.day-mode {
            background-color: #fff;
            color: #111;
        }

        body.night-mode {
            background-color: #121212;
            color: #e0e0e0;
        }

        /* ---------- Fonts ---------- */
        body.font-default {
            font-family: Arial, sans-serif;
        }

        body.font-thai {
            font-family: 'Sarabun', 'Noto Sans Thai', sans-serif;
        }

        body.font-serif {
            font-family: 'Times New Roman', serif;
        }

        /* ---------- Controls ---------- */
        label,
        select,
        button,
        input {
            margin: 4px;
            padding: 4px;
        }

        button {
            cursor: pointer;
            border-radius: 4px;
            border: 1px solid #ccc;
            background: #f0f0f0;
            transition: background 0.3s;
        }

        button:hover {
            background: #ddd;
        }

        /* ---------- Responsive ---------- */
        @media (max-width:768px) {
            body {
                font-size: 0.95rem;
            }
        }

        @media (max-width:480px) {
            body {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body class="day-mode font-default">
    <div class="container">

        <!-- Settings Panel -->
        <div id="settingsPanel" class="panel">
            <details>
                <summary>Help & TTS Setup Instructions</summary>
                <p>Enable TTS on your device (Huawei, Android, iOS, browsers). Ensure high-quality voices are installed.
                </p>
            </details>
            <label>Voice: <select id="voiceSelect"></select></label>
            <label>Day/Night Mode: <select id="themeSelect">
                    <option value="day-mode">Day</option>
                    <option value="night-mode">Night</option>
                </select></label>
            <label>Font: <select id="fontSelect">
                    <option value="font-default">Default</option>
                    <option value="font-thai">Thai</option>
                    <option value="font-serif">Serif</option>
                </select></label>
            <label><input type="checkbox" id="muteTTS"> Mute TTS</label>
            <label><input type="checkbox" id="muteFeedback"> Mute Feedback Sounds</label>
            <button id="testTTSBtn">Test TTS</button>
            <input type="file" id="uploadBookFile" accept=".json">
        </div>

        <!-- Book, Chapter, Paragraph Selection -->
        <div class="panel">
            <label>Book: <select id="bookSelect"></select></label>
            <label>Chapter: <select id="chapterSelect"></select></label>
            <label>Paragraph: <select id="paragraphSelect"></select></label>
            <button id="prevParagraphBtn">Previous</button>
            <button id="nextParagraphBtn">Next</button>
        </div>

        <!-- Paragraph Container -->
        <div id="paragraphContainer" class="panel"></div>

        <!-- Quiz Panel -->
        <div id="quizPanel" class="panel">
            <div class="question"></div>
            <div class="answers"></div>
            <div>Score: <span id="quizScore">0</span></div>
            <button id="prevQuizBtn">Previous</button>
            <button id="nextQuizBtn">Next</button>
        </div>

        <!-- Resources Panel -->
        <div id="resourcesPanel" class="panel"></div>

    </div>

    <script>
        // ---------- Default Book JSON ----------
        let defaultBook = {
            "title": "Do You Speak Thai?",
            "books": [
                {
                    "title": "Thai Consonants",
                    "chapters": [
                        { "title": "Low Class Consonants", "paragraphs": [{ "words": [{ "English": "cow", "Thai": "ควาย", "hint": "Large mammal" }, { "English": "fish", "Thai": "ปลา", "hint": "Aquatic animal" }, { "English": "mountain", "Thai": "ภูเขา", "hint": "Large landform" }, { "English": "dog", "Thai": "สุนัข", "hint": "Domestic animal" }, { "English": "cat", "Thai": "แมว", "hint": "Domestic animal" }] }, { "words": [{ "English": "bird", "Thai": "นก", "hint": "Flying animal" }, { "English": "tree", "Thai": "ต้นไม้", "hint": "Plant with trunk" }, { "English": "water", "Thai": "น้ำ", "hint": "Essential liquid" }, { "English": "food", "Thai": "อาหาร", "hint": "Substance for eating" }, { "English": "school", "Thai": "โรงเรียน", "hint": "Place for learning" }] }] },
                        { "title": "Middle Class Consonants", "paragraphs": [{ "words": [{ "English": "book", "Thai": "หนังสือ", "hint": "Printed material" }, { "English": "pen", "Thai": "ปากกา", "hint": "Writing instrument" }, { "English": "table", "Thai": "โต๊ะ", "hint": "Furniture item" }, { "English": "chair", "Thai": "เก้าอี้", "hint": "Furniture item" }, { "English": "window", "Thai": "หน้าต่าง", "hint": "Opening in wall" }] }, { "words": [{ "English": "door", "Thai": "ประตู", "hint": "Entryway" }, { "English": "computer", "Thai": "คอมพิวเตอร์", "hint": "Electronic device" }, { "English": "phone", "Thai": "โทรศัพท์", "hint": "Communication device" }, { "English": "light", "Thai": "แสง", "hint": "Visible radiant energy" }, { "English": "air", "Thai": "อากาศ", "hint": "Gaseous substance" }] }] },
                        { "title": "High Class Consonants", "paragraphs": [{ "words": [{ "English": "mountain", "Thai": "ภูเขา", "hint": "Large landform" }, { "English": "river", "Thai": "แม่น้ำ", "hint": "Flowing watercourse" }, { "English": "sky", "Thai": "ท้องฟ้า", "hint": "Above the earth" }, { "English": "cloud", "Thai": "เมฆ", "hint": "Visible mass of particles" }, { "English": "sun", "Thai": "พระอาทิตย์", "hint": "Star at the center of our system" }] }, { "words": [{ "English": "moon", "Thai": "พระจันทร์", "hint": "Natural satellite of Earth" }, { "English": "star", "Thai": "ดาว", "hint": "Luminous point in the night sky" }, { "English": "planet", "Thai": "ดาวเคราะห์", "hint": "Celestial body orbiting a star" }, { "English": "galaxy", "Thai": "กาแล็กซี่", "hint": "System of stars, stellar remnants" }, { "English": "universe", "Thai": "จักรวาล", "hint": "All of space and time" }] }] }
                    ]
                },
                {
                    "title": "Thai Vowels",
                    "chapters": [
                        { "title": "Short Vowels", "paragraphs": [{ "words": [{ "English": "cat", "Thai": "แมว", "hint": "Domestic animal" }, { "English": "bat", "Thai": "ค้างคาว", "hint": "Flying mammal" }, { "English": "rat", "Thai": "หนู", "hint": "Small rodent" }, { "English": "hat", "Thai": "หมวก", "hint": "Headwear" }, { "English": "mat", "Thai": "เสื่อ", "hint": "Floor covering" }] }] },
                        { "title": "Long Vowels", "paragraphs": [{ "words": [{ "English": "father", "Thai": "พ่อ", "hint": "Male parent" }, { "English": "car", "Thai": "รถ", "hint": "Vehicle" }, { "English": "star", "Thai": "ดาว", "hint": "Luminous point in the night sky" }, { "English": "far", "Thai": "ไกล", "hint": "At a great distance" }, { "English": "bar", "Thai": "บาร์", "hint": "Establishment serving drinks" }] }] },
                        { "title": "Diphthongs", "paragraphs": [{ "words": [{ "English": "coin", "Thai": "เหรียญ", "hint": "Currency" }, { "English": "boil", "Thai": "ต้ม", "hint": "Cook in water" }, { "English": "soil", "Thai": "ดิน", "hint": "Earth's surface material" }, { "English": "join", "Thai": "เข้าร่วม", "hint": "Become a member" }, { "English": "loin", "Thai": "เอว", "hint": "Part of the body" }] }] },
                        { "title": "Rarely Used Vowels", "paragraphs": [{ "words": [{ "English": "ear", "Thai": "หู", "hint": "Organ for hearing" }, { "English": "air", "Thai": "อากาศ", "hint": "Gaseous substance" }, { "English": "fair", "Thai": "ยุติธรรม", "hint": "Just treatment" }, { "English": "hair", "Thai": "ผม", "hint": "Strands growing from scalp" }, { "English": "pair", "Thai": "คู่", "hint": "Two items together" }] }] }
                    ]
                }
            ]
        };

        // ---------- State Variables ----------
        let currentBook = defaultBook, currentParagraphIndex = 0, currentQuizIndex = 0;
        let isTTSMuted = false, isFeedbackMuted = false, selectedVoice = null;
        let ttsVoices = [], quizScore = 0;

        // ---------- Functions ----------
        function animatePanel(panel) { panel.classList.add('hidden'); setTimeout(() => panel.classList.remove('hidden'), 10); }

        function speakText(text, lang) { return new Promise(resolve => { if (isTTSMuted) { resolve(); return; } const u = new SpeechSynthesisUtterance(text); if (selectedVoice) u.voice = selectedVoice; u.lang = lang; u.onend = resolve; speechSynthesis.speak(u); }); }

        function loadBook(book) { currentBook = book; populateBookSelect(); populateChapterSelect(); populateParagraphSelect(); loadParagraphWords(0); loadQuizQuestion(0); }

        function populateBookSelect() { const sel = document.getElementById('bookSelect'); sel.innerHTML = ''; currentBook.books.forEach((b, i) => { const opt = document.createElement('option'); opt.value = i; opt.textContent = b.title; sel.appendChild(opt); }); }

        function populateChapterSelect() { const sel = document.getElementById('chapterSelect'); sel.innerHTML = ''; currentBook.books[0].chapters.forEach((c, i) => { const opt = document.createElement('option'); opt.value = i; opt.textContent = c.title; sel.appendChild(opt); }); }

        function populateParagraphSelect() { const sel = document.getElementById('paragraphSelect'); sel.innerHTML = ''; currentBook.books[0].chapters[0].paragraphs.forEach((p, i) => { const opt = document.createElement('option'); opt.value = i; opt.textContent = `Paragraph ${i + 1}`; sel.appendChild(opt); }); }

        function loadParagraphWords(index) {
            currentParagraphIndex = index;
            const pContainer = document.getElementById('paragraphContainer'); pContainer.innerHTML = '';
            const paragraph = currentBook.books[0].chapters[0].paragraphs[index];
            paragraph.words.forEach(w => {
                const span = document.createElement('span'); span.textContent = w.English; span.className = 'word';
                span.addEventListener('click', async () => {
                    window.speechSynthesis.cancel();
                    span.classList.add('highlighted');
                    await speakText(w.English, 'en');
                    setTimeout(() => span.classList.remove('highlighted'), 400);
                });
                pContainer.appendChild(span);
            });
            animatePanel(pContainer);
        }

        function loadQuizQuestion(qIndex) {
            currentQuizIndex = qIndex;
            const qPanel = document.getElementById('quizPanel');
            const paragraph = currentBook.books[0].chapters[0].paragraphs[currentParagraphIndex];
            const questionWord = paragraph.words[qIndex];
            const questionDiv = qPanel.querySelector('.question');
            questionDiv.textContent = `Select the correct word: ${questionWord.Hint || questionWord.English}`;
            const answersDiv = qPanel.querySelector('.answers'); answersDiv.innerHTML = '';
            const options = [questionWord, ...paragraph.words.filter(w => w !== questionWord).slice(0, 3)].sort(() => Math.random() - 0.5);
            options.forEach(opt => {
                const btn = document.createElement('button'); btn.className = 'quiz-answer'; btn.textContent = opt.English;
                btn.addEventListener('click', async () => {
                    btn.classList.add(opt === questionWord ? 'correct' : 'incorrect');
                    quizScore += (opt === questionWord) ? 1 : 0; document.getElementById('quizScore').textContent = quizScore;
                    await speakText(opt.English, 'en');
                });
                answersDiv.appendChild(btn);
            });
            animatePanel(qPanel);
        }

        // ---------- Event Listeners ----------
        document.getElementById('nextParagraphBtn').addEventListener('click', () => {
            currentParagraphIndex = (currentParagraphIndex + 1) % currentBook.books[0].chapters[0].paragraphs.length;
            loadParagraphWords(currentParagraphIndex);
            loadQuizQuestion(0);
        });
        document.getElementById('prevParagraphBtn').addEventListener('click', () => {
            currentParagraphIndex = (currentParagraphIndex - 1 + currentBook.books[0].chapters[0].paragraphs.length) % currentBook.books[0].chapters[0].paragraphs.length;
            loadParagraphWords(currentParagraphIndex);
            loadQuizQuestion(0);
        });

        document.getElementById('uploadBookFile').addEventListener('change', e => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function (ev) { try { loadBook(JSON.parse(ev.target.result)); } catch (err) { alert("Invalid JSON"); } };
            reader.readAsText(file);
        });

        // ---------- TTS Voice Loading ----------
        function loadHighQualityVoices() {
            ttsVoices = speechSynthesis.getVoices().filter(v => v.localService && (v.lang.startsWith('en') || v.lang.startsWith('th')));
            const sel = document.getElementById('voiceSelect'); sel.innerHTML = '';
            ttsVoices.forEach((v, i) => { const opt = document.createElement('option'); opt.value = i; opt.textContent = `${v.name} (${v.lang})`; sel.appendChild(opt); });
            selectedVoice = ttsVoices[0];
        }
        speechSynthesis.onvoiceschanged = loadHighQualityVoices;

        // ---------- Theme & Font ----------
        document.getElementById('themeSelect').addEventListener('change', e => document.body.classList.replace('day-mode', 'night-mode'));
        document.getElementById('fontSelect').addEventListener('change', e => { document.body.classList.remove('font-default', 'font-thai', 'font-serif'); document.body.classList.add(e.target.value); });

    </script>
</body>

</html>
