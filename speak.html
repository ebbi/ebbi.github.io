<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Read Selected Thai Text</title>
</head>

<body>
    <h1>Selected Thai Text Reader</h1>
    <p>Select some Thai text on this page and click the button to have it read out loud.</p>

    <p lang="th-TH">สวัสดี</p>
    <button id="readButton">Read Selected Thai Text</button>
    <script>
        const readButton = document.getElementById('readButton');
        readButton.addEventListener('click', () => {
            const selectedText = window.getSelection().toString().trim();
            if (selectedText) {
                const speech = new SpeechSynthesisUtterance();
                speech.text = selectedText;
                // Set Thai language for correct pronunciation
                speech.lang = 'th-TH';
                speech.volume = 1;
                speech.rate = 1;
                speech.pitch = 1;
                window.speechSynthesis.speak(speech);
            } else {
                alert('No Thai text selected. Please select some Thai text to read.');
            }
        });
    </script>
</body>

</html>
